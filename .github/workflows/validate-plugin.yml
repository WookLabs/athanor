name: Validate plugin manifest
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JSON syntax check
        run: |
          python -m json.tool .claude-plugin/plugin.json > /dev/null
          python -m json.tool .claude-plugin/marketplace.json > /dev/null
          python -m json.tool hooks/hooks.json > /dev/null
      - name: Claude plugin validate
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .claude-plugin/plugin.json
          claude plugin validate .claude-plugin/marketplace.json
      # Duplicate-hooks check is covered here via
      # scripts/gates/manifest_checks.py::duplicate_hooks_path_check
      # (invoked by scripts/check_release_ready.py check_c).
      - name: Release gate (CI mode — CHANGELOG + manifest checks)
        # Runs only (b) CHANGELOG-entry + (c) no-duplicate-hooks.
        # (a) evidence-ready and (d) contract-ledger need .athanor/ session
        # artifacts which are gitignored and absent in CI fresh checkouts.
        run: python scripts/check_release_ready.py --ci
      - name: Regression fixtures (pytest)
        run: |
          pip install pytest
          pytest tests/ -v
