name: Validate plugin manifest
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JSON syntax check
        run: |
          python -m json.tool .claude-plugin/plugin.json > /dev/null
          python -m json.tool .claude-plugin/marketplace.json > /dev/null
          python -m json.tool hooks/hooks.json > /dev/null
      - name: Claude plugin validate
        # PROVISIONAL: if CLI install in CI proves flaky, this step may be
        # downgraded to continue-on-error. JSON syntax check above is the
        # minimum-guaranteed gate.
        continue-on-error: true
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .claude-plugin/plugin.json
          claude plugin validate .claude-plugin/marketplace.json
