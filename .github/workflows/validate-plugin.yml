name: Validate plugin manifest
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JSON syntax check
        run: |
          python -m json.tool .claude-plugin/plugin.json > /dev/null
          python -m json.tool .claude-plugin/marketplace.json > /dev/null
          python -m json.tool hooks/hooks.json > /dev/null
      - name: Duplicate hooks path check
        # Regression guard: plugin.json must not declare `hooks` pointing to the
        # same file Claude Code auto-discovers at hooks/hooks.json. This caused
        # the v0.6.2 "Duplicate hooks file detected" load failure.
        run: |
          python - <<'PY'
          import json, os, sys
          with open('.claude-plugin/plugin.json', encoding='utf-8') as f:
              manifest = json.load(f)
          auto = os.path.abspath('hooks/hooks.json') if os.path.exists('hooks/hooks.json') else None
          explicit = os.path.abspath(manifest['hooks']) if 'hooks' in manifest else None
          if auto and explicit and auto == explicit:
              sys.exit("plugin.json declares hooks -> hooks/hooks.json which is auto-discovered; remove the field")
          PY
      - name: Claude plugin validate
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .claude-plugin/plugin.json
          claude plugin validate .claude-plugin/marketplace.json
